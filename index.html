<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Velocity Realm – A cinematic WebGL driving experience with stylized low-poly world, real-time shaders, and physics-based car controls.">
    <title>Velocity Realm – Cinematic Web Driving World</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Start Overlay -->
    <div id="start-overlay">
        <div class="start-content">
            <div class="title-glow">VELOCITY REALM</div>
            <p class="subtitle">Cinematic Web Driving World</p>
            <div class="start-prompt">
                <span class="pulse-text">CLICK ANYWHERE TO START</span>
            </div>
            <div class="controls-hint-start">
                <div class="key-row">
                    <span class="key">W</span> Accelerate
                    <span class="key">S</span> Brake
                    <span class="key">A</span><span class="key">D</span> Steer
                    <span class="key">SPACE</span> Drift
                </div>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hud">
        <div class="hud-section speedo">
            <div class="speedo-label">SPEED</div>
            <div class="speedo-value">
                <span id="speed-value">0</span>
                <span class="speedo-unit">KM/H</span>
            </div>
            <div class="speed-bar">
                <div class="speed-bar-fill" id="speed-bar-fill"></div>
            </div>
        </div>
        <div class="hud-section gear">
            <div class="gear-label">GEAR</div>
            <div class="gear-value" id="gear-value">N</div>
        </div>
    </div>

    <!-- Controls hint (in-game) -->
    <div id="controls-overlay" class="controls-overlay">
        <span class="key-small">W</span><span class="key-small">A</span><span class="key-small">S</span><span class="key-small">D</span> Drive &nbsp; <span class="key-small">SPACE</span> Drift
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
